<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vignette · 3D Incubators</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main id="app">
      <header class="bar">
        <h1>Vignette</h1>
        <p class="sub">
          An AI agent decomposes a brief into several 3D objects and assembles them
          into one scene. Each object was generated by Lux3D via the Aholo MCP server.
        </p>
      </header>
      <section id="controls" class="panel"></section>
      <section id="brief" class="panel brief-panel"></section>
      <section id="status" class="panel status" aria-live="polite"></section>
      <section id="stage" class="stage" aria-label="3D viewport"></section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
