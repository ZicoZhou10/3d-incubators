<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Diorama · assemble 3D scenes from agent-generated parts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body data-screen="compose">
    <header class="topbar">
      <a href="/" class="brand">
        <span class="brand-mark">Diorama</span>
        <span class="brand-dot">.</span>
      </a>
      <p class="brand-tag">3D scene assembly · agent-generated parts · steerable</p>
      <div class="topbar-actions">
        <button type="button" id="api-key-chip" class="topbar-chip" data-present="false">Set API key</button>
        <a class="topbar-chip topbar-chip-ghost" href="https://github.com/ZicoZhou10/3d-incubators" target="_blank" rel="noreferrer">repo</a>
      </div>
    </header>

    <main id="app">
      <div id="stage" class="stage"></div>

      <section id="compose" class="screen" data-active="true"></section>
      <section id="rolling" class="screen" data-active="false"></section>
      <section id="variants" class="screen" data-active="false"></section>
      <section id="scene" class="screen scene-screen" data-active="false"></section>
    </main>

    <div id="modal" class="modal" data-state="closed"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
